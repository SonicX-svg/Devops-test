version: '3.8'

# Определяем отдельную сеть
networks:
  app-network:
    name: ${APP_NAME}_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16  # Явно указываем подсеть

services:
  # Бэкенд на Python
  backend:
    build: 
      context: ./backend
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
    container_name: ${APP_NAME}_backend
    working_dir: /app
    expose:
      - "${BACKEND_PORT}" 
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=${APP_NAME}
      - BACKEND_PORT=${BACKEND_PORT}
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT}
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',${BACKEND_PORT}))"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx — прокси на бэкенд
  nginx: 
    build: ./nginx
    container_name: ${APP_NAME}_nginx
    working_dir: /etc/nginx
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_PORT}"  # Хост:Контейнер
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: ${NGINX_MEMORY_LIMIT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${NGINX_PORT}/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 3
